<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d4af37" />
    <title>Offline · VIP Manager</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fdfbf7;
        --fg: #2b2625;
        --muted: #6b6563;
        --gold: #d4af37;
        --card: #f5efeb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: var(--card);
        border-radius: 20px;
        padding: 28px 24px;
        box-shadow: 0 18px 50px -28px rgba(43, 38, 37, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 0.95rem;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: var(--gold);
        color: #2b2625;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 12px 20px;
        font-size: 0.9rem;
        cursor: pointer;
      }
      .brand {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">Imperial Odyssey · Manager</div>
      <h1>You’re offline</h1>
      <p>
        The manager console needs a network connection to load live reservations and staff data.
        Check your connection, then try again.
      </p>
      <button type="button" onclick="location.href='/manager'">Retry</button>
    </div>
  </body>
</html>
