# wrangler.toml — Cloudflare Workers deployment for Imperial Odyssey
# See: https://developers.cloudflare.com/workers/framework-guides/web-apps/nextjs/

name = "imperial-odyssey"
main = ".open-next/worker.js"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ----------------------------------------------------------------------------
# Environment variables & secrets for Cloudflare deployment
# ----------------------------------------------------------------------------
# - Public vars (NEXT_PUBLIC_*) can be set as "Environment variables" in the
#   Cloudflare Workers dashboard (or [vars] here for build-time).
# - Server-only secrets (GOOGLE_MAPS_API_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   STRIPE_SECRET_KEY, RESEND_API_KEY, etc.) MUST be set as **Secrets** in the
#   dashboard (Settings → Variables and Secrets) or via:
#     npx wrangler secret put GOOGLE_MAPS_API_KEY
#     npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#
# For LOCAL preview (`npm run preview`):
#   Create a file named `.dev.vars` (gitignored) next to this one:
#     GOOGLE_MAPS_API_KEY=...
#     SUPABASE_SERVICE_ROLE_KEY=...
#
# After changing secrets you usually need a fresh deploy.
#
# Manager login requires these at minimum:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY — required for Stripe webhooks.
# RESEND_API_KEY + BOOKING_FROM_ADDRESS — required for transactional email.
# MANAGEMENT_EMAIL — ops alerts (new bookings, deposit paid); default info.phalotrans@gmail.com
# Quote BOOKING_FROM_EMAIL in the dashboard if it contains spaces:
#   Imperial Odyssey <bookings@vipodyssey.com>
#
# Deploy: npm run deploy
# ----------------------------------------------------------------------------